<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Изображения в парке</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: flex-start;
        }
        img {
            max-width: 100%;
            height: auto;
        }
        .left {
            flex: 1;
            text-align: left;
        }
        .right {
            flex: 1;
            text-align: right;
        }
        .top {
            width: 100%;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="top">
        <img src="media/geometry-dash.png" alt="Изображение сверху">
    </div>
    <div class="left">
        <img src="media/megumin.png" alt="Изображение слева">
    </div>
    <div class="right">
        <img src="media/emilia.jpg" alt="Изображение справа">
    </div>
</body>
</html>
